# Exemple de structure du Secret en clair (à ne pas committer).
# Copie en clos-Secrets.yaml (S majuscule), remplis les valeurs, puis kubeseal (voir README).
---
apiVersion: v1
kind: Secret
metadata:
  name: clos-secrets
  namespace: clos-de-la-reine
type: Opaque
stringData:
  mongodb-uri: ""
  mongodb-user: ""
  mongodb-password: ""
  mongodb-db: ""
  mongodb-host: ""
  jwt-secret: ""
  jwt-private-key: |
    -----BEGIN RSA PRIVATE KEY-----
    (contenu PEM)
    -----END RSA PRIVATE KEY-----
  jwt-public-key: |
    -----BEGIN PUBLIC KEY-----
    (contenu PEM)
    -----END PUBLIC KEY-----
