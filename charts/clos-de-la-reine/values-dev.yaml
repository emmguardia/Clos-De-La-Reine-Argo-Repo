# Valeurs pour l'environnement Dev/Staging (namespace clos-de-la-reine-dev)
# Utilisé par ArgoCD Application "Clos de la Reine - Dev" (branche develop)
# Les images sont mises à jour par la CI (digest) pour qu'ArgoCD détecte et déploie
#
# SealedSecret Dev : exécute depuis charts/clos-de-la-reine :
#   kubeseal --format yaml --namespace clos-de-la-reine-dev < secrets/clos-secrets.yaml
# Copie le bloc spec.encryptedData de la sortie et colle-le ci-dessous.
# Tant que encryptedData est vide, crée le secret à la main (legacy).

namespace: clos-de-la-reine-dev

sealedSecret:
  enabled: true

sealedSecretDev:
  encryptedData: {}

imagePullSecrets:
  - name: ghcr-secret

backend:
  image: ghcr.io/emmguardia/clos-de-la-reine-back@sha256:aec8732478f7a6b1a29619a2f64e29112f695c8c508e3e2c8cb242c5ca54ff95
  imagePullPolicy: Always
  replicas: 0  # Mettre à 1 quand tu bosses (kubectl scale ... --replicas=1)
  strategy:
    rollingUpdate:
      maxUnavailable: 1  # Nécessaire pour replicas=0 (maxUnavailable: 0 bloque le scale 0→1)
      maxSurge: 1
  port: 3000
  env:
    PORT: "3000"
    NODE_ENV: development
    FRONTEND_URL: ""  # Vide = CORS '*' et fallback closdelareine.fr pour les emails
    JWT_PRIVATE_KEY_PATH: /app/secrets/jwt_private_key.pem
    EMAIL_SERVICE_URL: http://email-service.email-service.svc.cluster.local:8080
  secretName: clos-secrets
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  hpa:
    enabled: false  # Pas d'HPA en dev (replicas gérés à la main)

frontend:
  image: ghcr.io/emmguardia/clos-de-la-reine-front@sha256:46ae620b97c77c95258bdee13862e5939a4925b34705949a1aadf7751e3ce825
  imagePullPolicy: Always
  replicas: 0  # Mettre à 1 quand tu bosses
  strategy:
    rollingUpdate:
      maxUnavailable: 1  # Nécessaire pour replicas=0 (maxUnavailable: 0 bloque le scale 0→1)
      maxSurge: 1
  serviceType: NodePort
  port: 80
  # Le front parle au back via le ConfigMap nginx (même namespace = clos-de-la-reine-dev)
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  hpa:
    enabled: false  # Pas d'HPA en dev
