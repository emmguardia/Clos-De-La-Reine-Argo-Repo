# Dependabot : détection des vulnérabilités et mises à jour de dépendances
#
# Regroupement par dependency-type → au plus 2 PR npm par dossier (prod / dev) par cycle,
# au lieu d’une PR par paquet. open-pull-requests-limit évite d’empiler trop de PR ouvertes.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/Backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    groups:
      backend-production:
        dependency-type: production
      backend-development:
        dependency-type: development

  - package-ecosystem: "npm"
    directory: "/Frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    groups:
      frontend-production:
        dependency-type: production
      frontend-development:
        dependency-type: development

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3

  - package-ecosystem: "docker"
    directory: "/Backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2

  - package-ecosystem: "docker"
    directory: "/Frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
