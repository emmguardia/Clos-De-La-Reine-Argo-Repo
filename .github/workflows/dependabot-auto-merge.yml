# Auto-merge des PR Dependabot quand les tests passent
# 1. Dependabot ouvre une PR
# 2. Les tests (build-and-push) s'exécutent sur la PR
# 3. Cette action merge automatiquement quand tous les checks sont verts

name: Dependabot Auto-Merge

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot Auto Merge
        uses: ahmadnassri/action-dependabot-auto-merge@v2.6.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
