# Default values for clos-de-la-reine (prod)
# Les images sont mises à jour par la CI (workflow build-and-push)

namespace: clos-de-la-reine
nameOverride: ""
fullnameOverride: ""

imagePullSecrets:
  - name: ghcr-secret

# Backend (Node)
backend:
  image: ghcr.io/emmguardia/clos-de-la-reine-back@sha256:63856f83ae51c65f12c7096e4af8c268f8b8569f7319cbbf60c5b71e4be3e44c
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  env:
    PORT: "3000"
    NODE_ENV: production
    JWT_PRIVATE_KEY_PATH: /app/secrets/jwt_private_key.pem
    EMAIL_SERVICE_URL: http://email-service.email-service.svc.cluster.local:8080
  secretName: clos-secrets
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    minReplicas: 1
    maxReplicas: 6
    cpuTarget: 70
    memoryTarget: 80

# Frontend (nginx)
frontend:
  image: ghcr.io/emmguardia/clos-de-la-reine-front@sha256:ad89db195bba12106ef99418996816aefaf1472dba5672be3d356e8fb442155f
  replicas: 1
  serviceType: NodePort
  port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  hpa:
    minReplicas: 1
    maxReplicas: 6
    cpuTarget: 70
    memoryTarget: 80
