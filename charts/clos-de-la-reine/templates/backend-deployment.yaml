apiVersion: apps/v1
kind: Deployment
metadata:
  name: clos-de-la-reine-back
  namespace: {{ include "clos.namespace" . }}
  labels:
    {{- include "clos.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: clos-de-la-reine-back
  template:
    metadata:
      labels:
        app: clos-de-la-reine-back
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: backend
        image: {{ .Values.backend.image }}
        imagePullPolicy: {{ .Values.backend.imagePullPolicy }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: {{ .Values.backend.port }}
        env:
        - name: PORT
          value: {{ .Values.backend.env.PORT | quote }}
        - name: NODE_ENV
          value: {{ .Values.backend.env.NODE_ENV | quote }}
        - name: JWT_PRIVATE_KEY_PATH
          value: {{ .Values.backend.env.JWT_PRIVATE_KEY_PATH | quote }}
        - name: EMAIL_SERVICE_URL
          value: {{ .Values.backend.env.EMAIL_SERVICE_URL | quote }}
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: {{ .Values.backend.secretName }}
              key: mongodb-uri
        - name: MONGODB_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Values.backend.secretName }}
              key: mongodb-user
        - name: MONGODB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.backend.secretName }}
              key: mongodb-password
        - name: MONGODB_DB
          valueFrom:
            secretKeyRef:
              name: {{ .Values.backend.secretName }}
              key: mongodb-db
        - name: MONGODB_HOST
          valueFrom:
            secretKeyRef:
              name: {{ .Values.backend.secretName }}
              key: mongodb-host
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.backend.secretName }}
              key: jwt-secret
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
        volumeMounts:
        - name: secrets
          mountPath: /app/secrets
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 5
      volumes:
      - name: secrets
        secret:
          secretName: {{ .Values.backend.secretName }}
          items:
          - key: jwt-private-key
            path: jwt_private_key.pem
          - key: jwt-public-key
            path: jwt_public_key.pem
