# Valeurs pour l'environnement Dev/Staging (namespace clos-de-la-reine-dev)
# Utilisé par ArgoCD Application "Clos de la Reine - Dev" (branche develop)
# Les images sont mises à jour par la CI (digest) pour qu'ArgoCD détecte et déploie
# En dev on n'utilise pas SealedSecret : le secret clos-secrets est créé à la main (copie du secret prod).

namespace: clos-de-la-reine-dev

sealedSecret:
  enabled: false

imagePullSecrets:
  - name: ghcr-secret

backend:
  image: ghcr.io/emmguardia/clos-de-la-reine-back@sha256:efc246e65932396497d989f0b951ecf58f765b478628fedc6105a5e64b1ad606
  imagePullPolicy: Always
  replicas: 0  # Mettre à 1 quand tu bosses (kubectl scale ... --replicas=1)
  strategy:
    rollingUpdate:
      maxUnavailable: 1  # Nécessaire pour replicas=0 (maxUnavailable: 0 bloque le scale 0→1)
      maxSurge: 1
  port: 3000
  env:
    PORT: "3000"
    NODE_ENV: development
    FRONTEND_URL: ""  # Vide = CORS '*' et fallback closdelareine.fr pour les emails
    JWT_PRIVATE_KEY_PATH: /app/secrets/jwt_private_key.pem
    EMAIL_SERVICE_URL: http://email-service.email-service.svc.cluster.local:8080
  secretName: clos-secrets
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  hpa:
    enabled: false  # Pas d'HPA en dev (replicas gérés à la main)

frontend:
  image: ghcr.io/emmguardia/clos-de-la-reine-front@sha256:fba90b87b7487e2567f553864c55f8364b2bebc95264c9e59783751cf6cfda7b
  imagePullPolicy: Always
  replicas: 0  # Mettre à 1 quand tu bosses
  strategy:
    rollingUpdate:
      maxUnavailable: 1  # Nécessaire pour replicas=0 (maxUnavailable: 0 bloque le scale 0→1)
      maxSurge: 1
  serviceType: NodePort
  port: 80
  # Le front parle au back via le ConfigMap nginx (même namespace = clos-de-la-reine-dev)
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  hpa:
    enabled: false  # Pas d'HPA en dev
