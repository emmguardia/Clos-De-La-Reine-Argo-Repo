# Default values for clos-de-la-reine (prod)
# Les images sont mises à jour par la CI (workflow build-and-push)

namespace: clos-de-la-reine

# En prod on déploie le secret via SealedSecret (chiffré dans le repo)
sealedSecret:
  enabled: true
nameOverride: ""
fullnameOverride: ""

imagePullSecrets:
  - name: ghcr-secret

# Backend (Node)
backend:
  image: ghcr.io/emmguardia/clos-de-la-reine-back@sha256:574c4510e71dcf9d61d0b32961b2aac0fbe0e956297dc6adeade1e2c5e42db15
  imagePullPolicy: IfNotPresent
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 0  # Prod : zéro downtime
      maxSurge: 1
  port: 3000
  env:
    PORT: "3000"
    NODE_ENV: production
    # URL du frontend (CORS + liens emails reset-password). À adapter si tu changes de domaine (ex: https://leclosdelareine.com)
    FRONTEND_URL: "https://leclosdelareine.com"
    JWT_PRIVATE_KEY_PATH: /app/secrets/jwt_private_key.pem
    EMAIL_SERVICE_URL: http://email-service.email-service.svc.cluster.local:8080
    INVOICE_SERVICE_URL: http://invoice-service.invoice-service.svc.cluster.local:8080
    JWT_INVOICE_PRIVATE_KEY_PATH: /app/secrets/jwt_invoice_private_key.pem
  secretName: clos-secrets
  resources:
    requests:
      cpu: "100m"
      memory: "384Mi"
    limits:
      cpu: "500m"
      memory: "768Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 6
    cpuTarget: 70
    memoryTarget: 80

# Frontend (nginx)
frontend:
  image: ghcr.io/emmguardia/clos-de-la-reine-front@sha256:40442a014a00e7cae0c0edc3a2a4a91d32403537b814b9f3569dab99593c666e
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 0  # Prod : zéro downtime
      maxSurge: 1
  serviceType: NodePort
  port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 6
    cpuTarget: 70
    memoryTarget: 80
