apiVersion: v1
kind: Service
metadata:
  name: clos-de-la-reine-front
  namespace: clos-de-la-reine
spec:
  type: LoadBalancer
  selector:
    app: clos-de-la-reine-front
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clos-de-la-reine-front
  namespace: clos-de-la-reine
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: clos-de-la-reine-front
  template:
    metadata:
      labels:
        app: clos-de-la-reine-front
    spec:
      containers:
      - name: nginx
        image: clos-de-la-reine-front:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10

