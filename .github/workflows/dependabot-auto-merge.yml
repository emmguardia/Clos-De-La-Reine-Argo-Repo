# Auto-merge des PR Dependabot quand les checks sont verts
#
# Pourquoi ça bloquait avant :
# - Les workflows déclenchés par dependabot[bot] ont un GITHUB_TOKEN « fork-like » (souvent read-only)
#   sauf si tu élèves explicitement les permissions : https://docs.github.com/en/code-security/dependabot/troubleshooting-dependabot/troubleshooting-dependabot-on-github-actions
# - contents:read empêche toute fusion / auto-merge via l’API
# - L’option repo « Allow auto-merge » ne suffit pas : il faut qu’un job appelle l’API (gh pr merge --auto) ou active l’auto-merge
#
# Branch protection : si « Require approvals » est activé, l’étape approve ci-dessous compte comme review du bot.
# Si tu exiges un humain, ajoute une exception pour dependabot[bot] dans les règles de branche.

name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Pas de merge auto des majors (revue manuelle)
      - name: Approve PR (patch / minor)
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (patch / minor)
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
