{{- /* SealedSecret pour Dev : secret chiffré, déploiement auto, plus de fallback JWT */}}
{{- if and (eq .Release.Namespace "clos-de-la-reine-dev") (index (index .Values "sealedSecretDev" "encryptedData" | default dict) "jwt-secret") }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
  name: clos-secrets
  namespace: clos-de-la-reine-dev
spec:
  encryptedData:
    {{- toYaml (index .Values "sealedSecretDev" "encryptedData") | nindent 4 }}
{{- end }}
