# Build and push: develop → tag :dev (staging), main → version + digest (prod)
# ArgoCD: App Dev = branche develop + namespace clos-de-la-reine-dev
#         App Prod = branche main + namespace clos-de-la-reine
#
# Runners GitHub (ubuntu) : illimités pour les repos publics

name: Build and push to GHCR

on:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (dev or prod tag)'
        required: true
        default: 'main'
        type: choice
        options:
          - main
          - develop

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: build-and-push-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            Backend/package-lock.json
            Frontend/package-lock.json

      - name: Backend – install
        run: cd Backend && npm ci

      - name: Backend – audit (moderate+)
        run: cd Backend && npm audit --audit-level=moderate

      - name: Backend – test
        run: cd Backend && npm test

      - name: Frontend – install
        run: |
          cd Frontend
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Frontend – audit (moderate+)
        run: cd Frontend && npm audit --audit-level=moderate

      - name: Frontend – lint
        run: cd Frontend && npm run lint -- --max-warnings 999

      - name: Frontend – test (if present)
        run: cd Frontend && npm run test --if-present

  build-and-push:
    name: Build and push
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            Backend/package-lock.json
            Frontend/package-lock.json

      - name: Set image tag (dev vs prod)
        id: tag
        run: |
          BRANCH="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref_name }}"
          if [ "$BRANCH" = "develop" ]; then
            TAG="dev"
            IS_DEV="true"
          else
            CONTENT=$(cat version.txt | tr -d '\r\n ')
            MAJOR=$(echo "$CONTENT" | cut -d. -f1)
            MINOR=$(echo "$CONTENT" | cut -d. -f2)
            PATCH=$(echo "$CONTENT" | cut -d. -f3)
            if ! [[ "$MAJOR" =~ ^[0-9]+$ ]] || ! [[ "$MINOR" =~ ^[0-9]+$ ]] || ! [[ "$PATCH" =~ ^[0-9]+$ ]]; then
              echo "version.txt invalide: $CONTENT (attendu X.Y.Z)"
              exit 1
            fi
            if [ "$PATCH" -lt 9 ]; then
              PATCH=$((PATCH + 1))
            else
              PATCH=0
              MINOR=$((MINOR + 1))
            fi
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "$NEW_VERSION" > version.txt
            TAG="v${NEW_VERSION}"
            IS_DEV="false"
          fi
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
          echo "IS_DEV=$IS_DEV" >> $GITHUB_ENV
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "is_dev=$IS_DEV" >> $GITHUB_OUTPUT
          echo "Branch: $BRANCH -> tag: $TAG (is_dev=$IS_DEV)"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend (dist/)
        run: |
          cd Backend
          npm ci
          npm run build

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/clos-de-la-reine-back
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}

      - name: Build and push backend
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          no-cache: true
          pull: true

      - name: Trivy scan (backend)
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm -e TRIVY_USERNAME -e TRIVY_PASSWORD \
            aquasec/trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --format table \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/clos-de-la-reine-back:${{ steps.tag.outputs.tag }}

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/clos-de-la-reine-front
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}

      - name: Build and push frontend
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          no-cache: true
          pull: true

      - name: Trivy scan (frontend)
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm -e TRIVY_USERNAME -e TRIVY_PASSWORD \
            aquasec/trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --format table \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/clos-de-la-reine-front:${{ steps.tag.outputs.tag }}

      # Piner les images par digest pour qu'ArgoCD détecte le changement et déploie
      - name: Pin Helm values to image digest
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          IS_DEV="${{ steps.tag.outputs.is_dev }}"
          DIGEST_BACKEND="${{ steps.build-backend.outputs.digest }}"
          DIGEST_FRONTEND="${{ steps.build-frontend.outputs.digest }}"
          OWNER="${{ github.repository_owner }}"
          REG="${{ env.REGISTRY }}"

          if [ -n "$DIGEST_BACKEND" ]; then
            BACKEND_IMAGE="${REG}/${OWNER}/clos-de-la-reine-back@${DIGEST_BACKEND}"
          else
            BACKEND_IMAGE="${REG}/${OWNER}/clos-de-la-reine-back:${TAG}"
          fi
          if [ -n "$DIGEST_FRONTEND" ]; then
            FRONTEND_IMAGE="${REG}/${OWNER}/clos-de-la-reine-front@${DIGEST_FRONTEND}"
          else
            FRONTEND_IMAGE="${REG}/${OWNER}/clos-de-la-reine-front:${TAG}"
          fi

          if [ "$IS_DEV" = "true" ]; then
            VALUES_PATH="charts/clos-de-la-reine/values-dev.yaml"
          else
            VALUES_PATH="charts/clos-de-la-reine/values.yaml"
          fi

          sed -i "s|  image: ghcr.io/.*clos-de-la-reine-back.*|  image: ${BACKEND_IMAGE}|" "$VALUES_PATH"
          sed -i "s|  image: ghcr.io/.*clos-de-la-reine-front.*|  image: ${FRONTEND_IMAGE}|" "$VALUES_PATH"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$IS_DEV" = "true" ]; then
            git add "$VALUES_PATH"
          else
            git add version.txt "$VALUES_PATH"
          fi

          if git diff --staged --quiet; then
            echo "Helm values already up to date, skip commit"
          else
            git commit -m "chore(helm): pin images to digest $TAG [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi
