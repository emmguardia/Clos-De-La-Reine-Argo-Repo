# Nginx config pour le front : proxy /api/ vers le back du même namespace
# Permet dev (clos-de-la-reine-dev) et prod (clos-de-la-reine) avec la même image
apiVersion: v1
kind: ConfigMap
metadata:
  name: clos-de-la-reine-front-nginx
  namespace: {{ include "clos.namespace" . }}
  labels:
    {{- include "clos.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json image/svg+xml;

        client_max_body_size 50M;

        location /api/ {
            proxy_pass http://clos-de-la-reine-back.{{ .Release.Namespace }}.svc.cluster.local:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        location /Images/ {
            alias /usr/share/nginx/html/Images/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location = /sitemap.xml {
            add_header Content-Type application/xml;
            try_files $uri =404;
        }

        location = /robots.txt {
            add_header Content-Type text/plain;
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        error_page 404 /index.html;
        error_page 405 =200 /index.html;
    }
