# Valeurs pour l'environnement Dev/Staging (namespace clos-de-la-reine-dev)
# Utilisé par ArgoCD Application "Clos de la Reine - Dev" (branche develop)
# Les images sont taguées :dev par la CI sur push develop

namespace: clos-de-la-reine-dev

imagePullSecrets:
  - name: ghcr-secret

backend:
  image: ghcr.io/emmguardia/clos-de-la-reine-back:dev
  imagePullPolicy: Always
  replicas: 1
  port: 3000
  env:
    PORT: "3000"
    NODE_ENV: development
    JWT_PRIVATE_KEY_PATH: /app/secrets/jwt_private_key.pem
    EMAIL_SERVICE_URL: http://email-service.email-service.svc.cluster.local:8080
  secretName: clos-secrets
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

frontend:
  image: ghcr.io/emmguardia/clos-de-la-reine-front:dev
  imagePullPolicy: Always
  replicas: 1
  serviceType: NodePort
  port: 80
  # Le front parle au back via le ConfigMap nginx (même namespace = clos-de-la-reine-dev)
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
