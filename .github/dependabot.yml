# Dependabot : détection des vulnérabilités et mises à jour de dépendances
# Crée des PR automatiquement → merge manuel ou auto-merge (Settings > General > Allow auto-merge)

version: 2
updates:
  # npm Backend
  - package-ecosystem: "npm"
    directory: "/Backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/Frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Regroupe la stack ESLint dans une seule PR quand plusieurs de ces paquets ont une MAJ le même cycle
    # (évite une PR « @eslint/js 10 » seule alors qu’il faut aussi eslint 10 + plugins). Pas d’ignore : tu vois toujours les PR.
    groups:
      frontend-eslint:
        patterns:
          - "eslint"
          - "@eslint/js"
          - "typescript-eslint"
          - "eslint-plugin-react-hooks"
          - "eslint-plugin-react-refresh"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Docker (Dockerfiles)
  - package-ecosystem: "docker"
    directory: "/Backend"
    schedule:
      interval: "weekly"
      day: "monday"

  - package-ecosystem: "docker"
    directory: "/Frontend"
    schedule:
      interval: "weekly"
      day: "monday"
